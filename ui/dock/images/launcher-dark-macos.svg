<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#c8b8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Glow behind sparkle -->
  <circle cx="32" cy="32" r="16" fill="url(#glow)" filter="url(#blur)" opacity="0.6"/>

  <!-- 4-pointed sparkle — main star -->
  <path d="M32 10 C32 10, 30 28, 10 32 C10 32, 30 34, 32 54 C32 54, 34 34, 54 32 C54 32, 34 30, 32 10 Z"
        fill="white"/>

  <!-- Small dots around sparkle -->
  <circle cx="18" cy="18" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="46" cy="18" r="1.0" fill="white" opacity="0.4"/>
  <circle cx="46" cy="46" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="18" cy="46" r="1.0" fill="white" opacity="0.4"/>
</svg>
